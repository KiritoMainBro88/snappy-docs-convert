name: Antivirus false positive
description: Report Defender or antivirus detection on an official kmb file tools release asset.
title: "[False Positive]: "
labels:
  - false-positive
  - security
body:
  - type: markdown
    attributes:
      value: |
        Use this only for official GitHub Release downloads. Do not paste secrets or private document paths.
  - type: input
    id: version
    attributes:
      label: App version
      placeholder: v0.1.0-beta.1
    validations:
      required: true
  - type: dropdown
    id: asset
    attributes:
      label: Asset used
      options:
        - Installer EXE
        - Portable ZIP
        - Other
    validations:
      required: true
  - type: input
    id: sha256
    attributes:
      label: SHA256
      description: Hash of the downloaded file.
    validations:
      required: true
  - type: input
    id: vendor
    attributes:
      label: Antivirus vendor
      placeholder: Microsoft Defender, Avast, Bitdefender, etc.
    validations:
      required: true
  - type: input
    id: detection
    attributes:
      label: Detection name
      placeholder: e.g. Trojan:Win32/...
    validations:
      required: true
  - type: textarea
    id: screenshot
    attributes:
      label: Screenshot/log
      description: Paste detection text or attach screenshot. Remove private data first.
    validations:
      required: true
  - type: input
    id: download-url
    attributes:
      label: Download source URL
      placeholder: https://github.com/KiritoMainBro88/snappy-docs-convert/releases/...
    validations:
      required: true
  - type: dropdown
    id: hash-match
    attributes:
      label: Did hash match official release?
      options:
        - "yes"
        - "no"
        - "not checked"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS version
      placeholder: Windows 11 24H2
    validations:
      required: true
